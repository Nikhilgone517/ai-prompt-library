version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: promptdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - prompt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d promptdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - prompt-net

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - prompt-net

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - prompt-net

# This section right here is what Docker was missing! 
# It must have zero spaces in front of it.
networks:
  prompt-net:
    driver: bridge