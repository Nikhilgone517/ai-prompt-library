<div *ngIf="prompt" style="border: 1px solid #ccc; padding: 20px; border-radius: 5px;">
  <h2>{{ prompt.title }}</h2>
  <span style="background: #eee; padding: 5px 10px; border-radius: 15px; font-size: 14px;">
    Complexity: {{ prompt.complexity }} / 10
  </span>
  
  <div style="margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #333;">
    <p style="white-space: pre-wrap; margin: 0;">{{ prompt.content }}</p>
  </div>

  <div style="margin-top: 20px; color: #666; font-size: 14px; font-weight: bold;">
    👁️ Views: <span style="color: red; font-size: 18px;">{{ prompt.view_count }}</span>
  </div>
</div>

<div *ngIf="!prompt">Loading prompt details...</div>
